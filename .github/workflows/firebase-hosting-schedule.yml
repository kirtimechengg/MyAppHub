name: Deploy to Firebase Hosting on HTML changes

on:
  push:
    branches:
      - main
    paths:
      - 'public/**/*.html'
      - 'public/*.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_APP_HUB_69DB8 }}
          channelId: live
          projectId: my-app-hub-69db8
