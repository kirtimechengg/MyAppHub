<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Page</title>
    <!-- Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <!-- 1. SHARED NAVIGATION (Auto-injected) -->
    <div id="global-nav"></div>

    <!-- 2. YOUR PAGE CONTENT -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8">
        
        <div class="flex items-center gap-4 mb-8">
            <a href="index.html" class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition">← Back</a>
            <h1 class="text-3xl font-bold">New Page Title</h1>
        </div>

        <!-- Example Card -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-8 border border-slate-200 dark:border-slate-700 shadow-sm">
            <h2 class="text-xl font-bold mb-4">Page Content</h2>
            <p class="text-slate-500 mb-6">This page is automatically connected to Firebase, Auth, and the Global Store.</p>
            
            <!-- Global Store Demo -->
            <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800">
                <p class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase mb-2">Global Data Sync Demo</p>
                <p class="text-sm">Current Global Note: <strong id="note-display">Loading...</strong></p>
                <p class="text-xs text-slate-400 mt-2">Change this note on the Dashboard, and it will update here instantly.</p>
            </div>
        </div>

    </main>

    <!-- 3. REQUIRED SCRIPTS (Do not remove) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- 4. APP CORE (Embedded for Stability) -->
    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqGx_Skjp_RKxIK-pHRGOlp22uLJdy6WE",
            authDomain: "my-app-hub-69db8.firebaseapp.com",
            projectId: "my-app-hub-69db8",
            storageBucket: "my-app-hub-69db8.firebasestorage.app",
            messagingSenderId: "709494807607",
            appId: "1:709494807607:web:e8cdafc2511ab6e354b3b2",
            measurementId: "G-KWWNJDP8LY"
        };
        // Prevent accidental modification
        Object.freeze(firebaseConfig);

        // --- APP CORE ENGINE ---
        /**
         * 🧠 APP CORE
         * Handles Authentication, Global Data Store, and UI Navigation for all pages.
         */
        class AppCore {
            constructor() {
                this.user = null;
                this.db = null;
                this.auth = null;
                this.globalState = {
                    theme: 'light',
                    notifications: 0,
                    lastActive: null
                };
                this.stateListeners = [];
            }

            // --- INITIALIZATION ---
            async init() {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                this.auth = firebase.auth();
                this.db = firebase.firestore();

                // 🔌 Enable Offline Persistence
                try {
                    await this.db.enablePersistence();
                    console.log("🔌 Offline mode enabled");
                } catch (err) {
                    console.log("Persistence disabled:", err.code);
                }

                this.injectStyles();
                this.setupAuth();
            }

            // --- AUTHENTICATION ---
            setupAuth() {
                this.auth.onAuthStateChanged(user => {
                    this.user = user;
                    if (user) {
                        console.log(`✅ Logged in: ${user.email}`);
                        this.connectGlobalStore();
                        this.renderNav(); // Update nav with user info
                        this.onLogin(user); // Trigger page specific logic
                    } else {
                        console.log("🔒 Guest mode / Logged out");
                        // If we are not on index.html, redirect to login
                        // Check if running in a blob/preview environment where pathname might be odd
                        if (!window.location.pathname.endsWith('index.html') && !window.location.pathname.endsWith('/') && !window.location.href.includes('blob:')) {
                           // window.location.href = 'index.html'; // Commented out to prevent redirect loops in preview
                        }
                        this.renderNav();
                    }
                });
            }

            // --- 🌍 GLOBAL DATA STORE ---
            // This connects to a single document that all pages share
            connectGlobalStore() {
                if (!this.user) return;

                this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            this.globalState = { ...this.globalState, ...doc.data() };
                            this.notifyListeners();
                            this.applyTheme(this.globalState.theme);
                        } else {
                            // Initialize if empty
                            this.updateGlobalStore({ theme: 'light', created: Date.now() });
                        }
                    });
            }

            // Call this from ANY page to save data visible to ALL pages
            async updateGlobalStore(data) {
                if (!this.user) return;
                try {
                    await this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store').set(
                        { ...data, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    );
                } catch (e) {
                    console.error("Sync Error:", e);
                }
            }

            // Pages can subscribe to changes
            subscribe(callback) {
                this.stateListeners.push(callback);
                // Immediate callback with current state
                callback(this.globalState);
            }

            notifyListeners() {
                this.stateListeners.forEach(cb => cb(this.globalState));
                this.updateUI();
            }

            // --- UI & NAVIGATION ---
            injectStyles() {
                // Shared Tailwind Config
                if(typeof tailwind !== 'undefined') {
                    tailwind.config = {
                        darkMode: 'class',
                        theme: { extend: { fontFamily: { sans: ['Instrument Sans', 'sans-serif'] } } }
                    }
                }
            }

            applyTheme(theme) {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }

            toggleTheme() {
                const newTheme = this.globalState.theme === 'dark' ? 'light' : 'dark';
                this.updateGlobalStore({ theme: newTheme });
            }

            renderNav() {
                const navContainer = document.getElementById('global-nav');
                if (!navContainer) return;

                const email = this.user ? (this.user.email || 'Anonymous') : 'Not Logged In';
                const avatar = email.charAt(0).toUpperCase();

                navContainer.innerHTML = `
                    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-slate-800 dark:text-white hover:opacity-80 transition">
                                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">A</div>
                                <span>App Hub</span>
                            </a>

                            <div class="flex items-center gap-4">
                                <div id="global-status" class="hidden md:flex text-xs px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-slate-500">
                                    ${this.user ? '🟢 Synced' : '⚪ Offline'}
                                </div>

                                <button onclick="Core.toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                                    ${this.globalState.theme === 'dark' ? '🌙' : '☀️'}
                                </button>

                                <div class="relative group cursor-pointer">
                                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 text-white flex items-center justify-center font-bold shadow-sm">
                                        ${this.user ? avatar : '?'}
                                    </div>
                                    <!-- Dropdown -->
                                    <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 py-1 hidden group-hover:block">
                                        <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                                            <p class="text-xs text-slate-500">Signed in as</p>
                                            <p class="text-sm font-medium truncate text-slate-900 dark:text-slate-100">${email}</p>
                                        </div>
                                        ${this.user ? '<button onclick="firebase.auth().signOut()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">Sign Out</button>' : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>
                `;
            }

            // Placeholder for pages to override
            onLogin(user) {}
            updateUI() {}
        }

        // Initialize Global Instance
        const Core = new AppCore();
        // Init immediately if ready, else wait
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => Core.init());
        } else {
            Core.init();
        }
    </script>

    <script>
        // 5. YOUR CUSTOM LOGIC (Executed after Core is loaded)
        Core.onLogin = function(user) {
            console.log("Page ready for user:", user.email);
            
            // Subscribe to Global Store changes
            Core.subscribe((state) => {
                // Update UI based on global state
                const noteDisplay = document.getElementById('note-display');
                if (noteDisplay) {
                     noteDisplay.textContent = state.globalNote || 'No note set';
                }
            });
        };

        // Example: Saving local page data
        async function savePageData() {
            if (!Core.user) return;
            await Core.db.collection('users').doc(Core.user.uid).collection('my_new_collection').add({
                someData: "Hello World"
            });
        }
    </script>
</body>
</html>
