        // --- APP CORE ENGINE ---
        class AppCore {
            constructor() {
                this.user = null;
                this.db = null;
                this.auth = null;
                this.globalState = {
                    theme: 'light',
                    notifications: 0,
                    lastActive: null,
                    globalNote: ''
                };
                this.stateListeners = [];
            }

            async init() {
                if (typeof firebase === 'undefined') return;
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                this.auth = firebase.auth();
                this.db = firebase.firestore();

                try {
                    await this.db.enablePersistence();
                    console.log("🔌 Offline mode enabled");
                } catch (err) {
                    console.log("Persistence disabled:", err.code);
                }

                this.injectStyles();
                this.setupAuth();
            }

            setupAuth() {
                this.auth.onAuthStateChanged(user => {
                    this.user = user;
                    if (user) {
                        this.connectGlobalStore();
                        this.renderNav(); 
                    } else {
                        this.renderNav();
                    }
                });
            }

            connectGlobalStore() {
                if (!this.user) return;
                this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            this.globalState = { ...this.globalState, ...doc.data() };
                            this.notifyListeners();
                            this.applyTheme(this.globalState.theme);
                        } else {
                            this.updateGlobalStore({ theme: 'light', created: Date.now() });
                        }
                    });
            }

            async updateGlobalStore(data) {
                if (!this.user) return;
                try {
                    await this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store').set(
                        { ...data, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    );
                } catch (e) {
                    console.error("Sync Error:", e);
                }
            }

            subscribe(callback) {
                this.stateListeners.push(callback);
                callback(this.globalState);
            }

            notifyListeners() {
                this.stateListeners.forEach(cb => cb(this.globalState));
            }

            injectStyles() {
                if(typeof tailwind !== 'undefined') {
                    tailwind.config = {
                        darkMode: 'class',
                        theme: { extend: { fontFamily: { sans: ['Instrument Sans', 'sans-serif'] } } }
                    }
                }
            }

            applyTheme(theme) {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }

            toggleTheme() {
                const newTheme = this.globalState.theme === 'dark' ? 'light' : 'dark';
                this.updateGlobalStore({ theme: newTheme });
            }

            renderNav() {
                const navContainer = document.getElementById('global-nav');
                if (!navContainer) return;

                const email = this.user ? (this.user.email || 'Anonymous') : 'Not Logged In';
                const avatar = email.charAt(0).toUpperCase();

                navContainer.innerHTML = `
                    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-slate-800 dark:text-white hover:opacity-80 transition">
                                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">A</div>
                                <span>App Hub</span>
                            </a>

                            <div class="flex items-center gap-4">
                                <div id="global-status" class="hidden md:flex text-xs px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-slate-500">
                                    ${this.user ? '🟢 Synced' : '⚪ Offline'}
                                </div>

                                <button onclick="window.Core.toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                                    ${this.globalState.theme === 'dark' ? '🌙' : '☀️'}
                                </button>

                                <div class="relative group cursor-pointer">
                                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 text-white flex items-center justify-center font-bold shadow-sm">
                                        ${this.user ? avatar : '?'}
                                    </div>
                                    <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 py-1 hidden group-hover:block">
                                        <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                                            <p class="text-xs text-slate-500">Signed in as</p>
                                            <p class="text-sm font-medium truncate text-slate-900 dark:text-slate-100">${email}</p>
                                        </div>
                                        ${this.user ? '<button onclick="firebase.auth().signOut()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">Sign Out</button>' : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>
                `;
            }
        }

        // Initialize Global Instance
        window.Core = new AppCore();
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => window.Core.init());
        } else {
            window.Core.init();
        }
    </script>

                    { id: "t7", category: "Fatigue", label: "Cumulative Damage Limit", requirement: "Miner's Rule < 0.1 (Conservative)", insight: "While <1.0 is the theoretical limit, robust design usually targets <0.1 cumulative damage factor to account for material scatter and modeling uncertainties.", checked: false, status: "pending", notes: "" },
                    { id: "t8", category: "SCF", label: "Stress Concentration Factors", requirement: "Apply SCF at Keyways/Fillets", insight: "Calculated stress is nominal. Ensure Stress Concentration Factors (SCF) (typically 2.0 - 3.0) are applied at stress risers like keyways and shoulder fillets.", checked: false, status: "pending", notes: "" },
                    { id: "t9", category: "Plasticity", label: "Limited Plastic Deformation", requirement: "Permissible Strain < 0.2%", insight: "For rare transient events (like short circuits), API allows limited plastic deformation. If yielding occurs, verify the strain is minimal and won't cause unbalance.", checked: false, status: "pending", notes: "" }
                ]
            },
            coupling_dwg: {
                id: "coupling_dwg",
                title: "4. Coupling Drawing Check (API 671)",
                iconKey: "Settings",
                items: [
                    { id: "d1", category: "Fits", label: "Hydraulic Fit Details", requirement: "Taper 1:24 (preferred) or 1:50", insight: "Drawing must specify: Contact area req (>70-80%), Pull-up distance, Dilation pressure (for removal), and Residual contact pressure (must exceed torque + moment + centrifugal lift-off).", checked: false, status: "pending", notes: "" },
                    { id: "d2", category: "Solo Plate", label: "Solo Run / Moment Simulator", requirement: "Included in BOM", insight: "When motor runs uncoupled (Solo Run), the shaft end needs a weight to simulate the coupling hub mass/moment to prevent rotordynamic instability. Is this 'Solo Plate' provided?", checked: false, status: "pending", notes: "" },
                    { id: "d3", category: "Balancing", label: "Balance Standard", requirement: "AGMA 9000 Class 9 / ISO 1940 G1.0", insight: "For high speed (>3600 rpm), usually Component Balance + Assembly Check Balance is required. Mandrel balancing is preferred for hubs. Verify balance holes are prohibited in the effective spacer length.", checked: false, status: "pending", notes: "" },
                    { id: "d4", category: "Geometry", label: "Puller Holes & Overhang", requirement: "Maintenance Features", insight: "Are threaded puller holes provided on the hub face? Is the 'Shaft End to Hub Face' dimension defined (Overhang)? Verify reduced keys are used if keyway exists (Half-key convention).", checked: false, status: "pending", notes: "" },
                    { id: "d5", category: "Shims", label: "Shim Pack / Disc Pack", requirement: "Pre-stretch / Compression", insight: "Some couplings require the spacer to be compressed/stretched during install to account for thermal growth. Check the 'Gap' dimension vs 'Free Length'.", checked: false, status: "pending", notes: "" },
                    { id: "d6", category: "Keyway", label: "Keyway Fillet Radii", requirement: "Specified Radii (No Sharp Corners)", insight: "If the coupling is keyed, the drawing must specify fillet radii in the keyway corners to reduce stress concentration. Sharp corners are fatigue cracks waiting to happen.", checked: false, status: "pending", notes: "" },
                    { id: "d7", category: "VFD", label: "Electrical Insulation", requirement: "Insulated Hub/Spacer", insight: "For VFD drives, the coupling is often the electrical break to prevent eddy currents from arcing through compressor bearings. Verify insulation washers/sleeves are shown.", checked: false, status: "pending", notes: "" },
                    { id: "d8", category: "Weight", label: "Center of Gravity (CG)", requirement: "Verify Overhung Moment", insight: "The drawing must explicitly state the Weight and the Center of Gravity relative to the shaft end. This calculates the 'Overhung Moment' which affects rotordynamics.", checked: false, status: "pending", notes: "" },
                    { id: "d9", category: "Dynamics", label: "Axial Natural Frequency (ANF)", requirement: "ANF Calculation > Operating Range", insight: "Disc couplings act as axial springs. Ensure the ANF is calculated and has a 20% margin from operating speed/2x speed to prevent axial resonance.", checked: false, status: "pending", notes: "" },
                    { id: "d10", category: "Material", label: "Hub Hardness", requirement: "Hardness for Hydraulic Removal", insight: "Hubs removed hydraulically need sufficient hardness (e.g., 30-35 HRC) to prevent galling or seizing on the shaft during removal.", checked: false, status: "pending", notes: "" }
                ]
            },
            datasheet: {
                id: "datasheet",
                title: "5. Coupling Datasheet (API 671)",
                iconKey: "Table",
                items: [
                    { id: "ds1", category: "Rating", label: "Torque Ratings", requirement: "Selection Service Factor", insight: "API 671 typically requires min Service Factor 1.5. Max Continuous Torque Rating of coupling must be > (Motor Rated Torque x 1.5).", checked: false, status: "pending", notes: "" },
                    { id: "ds2", category: "Misalignment", label: "Misalignment Capacity", requirement: "Combined limit > Machine Growth", insight: "Check capacity for: Axial (+/-), Angular (deg), and Parallel Offset (mm). The coupling must handle the 'Combined' worst case of thermal growth + mechanical tolerance.", checked: false, status: "pending", notes: "" },
                    { id: "ds3", category: "Material", label: "Material Grades", requirement: "42CrMo4 / AISI 4140 or better", insight: "Hubs/Spacers usually high strength alloy steel. Shims usually Stainless Steel (301/316) or Inconel. Bolts usually 12.9 grade or AerMet 100 for high performance.", checked: false, status: "pending", notes: "" },
                    { id: "ds4", category: "Windage", label: "Windage & Heat", requirement: "Guard Temperature check", insight: "For high speed couplings, windage creates significant heat. Check if the coupling design is 'Low Windage' (smooth surface) or if the guard requires ventilation.", checked: false, status: "pending", notes: "" },
                    { id: "ds5", category: "Tolerance", label: "Inertia Tolerance", requirement: "Max Deviation +/- 5%", insight: "Datasheet should state the tolerance on the quoted Mass Moment of Inertia. Large deviations invalidate the Torsional Analysis.", checked: false, status: "pending", notes: "" },
                    { id: "ds6", category: "Capacity", label: "Peak Overload Capacity", requirement: "115% of Max Transient", insight: "API 671 requires the coupling to survive 115% of the system's worst-case transient torque (e.g., Short Circuit) without failure.", checked: false, status: "pending", notes: "" },
                    { id: "ds7", category: "Factor", label: "Service Factor Base", requirement: "Applied to Driver Rating", insight: "Verify the Service Factor (e.g., 1.5) is applied to the Driver (Motor) Nameplate Rating, NOT the absorbed power of the compressor.", checked: false, status: "pending", notes: "" },
                    { id: "ds8", category: "Stiffness", label: "Axial Stiffness (Ka)", requirement: "Review Thrust Load Impact", insight: "High axial stiffness transmits thermal growth forces to the machine thrust bearings. Verify Ka is low enough to keep thrust loads within machine limits.", checked: false, status: "pending", notes: "" },
                    { id: "ds9", category: "Lateral", label: "Lateral Critical Speed Impact", requirement: "Coupling Half Weight", insight: "The 'Coupling Half Weight' acts as an overhung mass. Verify this specific weight does not drop the machine's 2nd Critical Speed into the operating range.", checked: false, status: "pending", notes: "" }
                ]
            }
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md border border-slate-200 animate-[fadeIn_0.2s_ease-out]">
                        <div className="flex justify-between items-center p-4 border-b border-slate-100">
                            <h3 className="text-lg font-bold text-slate-800">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors">
                                <Icons.X />
                            </button>
                        </div>
                        <div className="p-4">{children}</div>
                    </div>
                </div>
            );
        };

        const TVAReviewTool = () => {
            const [activeSection, setActiveSection] = useState('model');
            const [checklistData, setChecklistData] = useState(DEFAULT_DATA);
            const [projectDetails, setProjectDetails] = useState(DEFAULT_PROJECT_DETAILS);
            const [progress, setProgress] = useState(0);
            const [searchQuery, setSearchQuery] = useState("");
            const [saving, setSaving] = useState(false);
            const [user, setUser] = useState(null);

            // Modal States
            const [isSectionModalOpen, setIsSectionModalOpen] = useState(false);
            const [isItemModalOpen, setIsItemModalOpen] = useState(false);
            const [newSectionData, setNewSectionData] = useState({ title: '', iconKey: 'Shield' });
            const [newItemData, setNewItemData] = useState({ category: '', label: '', requirement: '', insight: '' });
            
            const fileInputRef = useRef(null);
            
            // --- FIREBASE INTEGRATION ---
            
            // 1. Listen for Auth State
            useEffect(() => {
                const checkAuth = setInterval(() => {
                    if (window.Core && window.Core.user) {
                        setUser(window.Core.user);
                        clearInterval(checkAuth);
                        loadFromFirebase(window.Core.user.uid);
                    }
                }, 500);
                return () => clearInterval(checkAuth);
            }, []);

            // 2. Load Data
            const loadFromFirebase = (uid) => {
                if(!window.Core || !window.Core.db) return;
                
                const docRef = window.Core.db.collection('users').doc(uid).collection('app_data').doc('tva_tool');
                
                docRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if(data.checklist) setChecklistData(data.checklist);
                        if(data.project) setProjectDetails(data.project);
                    } else {
                        // First time? Save default
                        saveToFirebase(checklistData, projectDetails, uid);
                    }
                }).catch(err => console.error("Load Error:", err));
            };

            // 3. Debounced Save (Native implementation)
            function debounce(func, wait) {
                let timeout;
                return function(...args) {
                    const context = this;
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(context, args), wait);
                };
            }
            const saveRef = useRef(debounce((d, p, u) => saveToFirebase(d, p, u), 2000));

            const saveToFirebase = async (data, proj, uid) => {
                if(!window.Core || !window.Core.db) return;
                setSaving(true);
                try {
                    await window.Core.db.collection('users').doc(uid).collection('app_data').doc('tva_tool').set({
                        checklist: data,
                        project: proj,
                        lastModified: new Date().toISOString()
                    }, { merge: true });
                    setTimeout(() => setSaving(false), 500);
                } catch(e) {
                    console.error("Save failed", e);
                    setSaving(false);
                }
            };

            // Trigger Save on Change
            useEffect(() => {
                if(user) {
                    setSaving(true); // Show immediate feedback
                    saveRef.current(checklistData, projectDetails, user.uid);
                    calculateProgress();
                }
            }, [checklistData, projectDetails, user]);


            const calculateProgress = () => {
                let total = 0;
                let checked = 0;
                Object.values(checklistData).forEach(section => {
                    section.items.forEach(item => {
                        total++;
                        if (item.checked) checked++;
                    });
                });
                setProgress(total === 0 ? 0 : Math.round((checked / total) * 100));
            };

            const resetData = () => {
                if (confirm("Reset all data to default? This cannot be undone.")) {
                    setChecklistData(DEFAULT_DATA);
                    setProjectDetails(DEFAULT_PROJECT_DETAILS);
                    // Force immediate save for reset
                    if(user) saveToFirebase(DEFAULT_DATA, DEFAULT_PROJECT_DETAILS, user.uid);
                }
            };

            // --- EXPORT/IMPORT LOGIC ---
            
            const exportJSON = () => {
                const dataToSave = {
                    project: projectDetails,
                    checklist: checklistData
                };
                const dataStr = JSON.stringify(dataToSave, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `TVA_Review_Backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleImportClick = () => {
                if(fileInputRef.current) fileInputRef.current.click();
            };

            const handleImportFile = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData && typeof importedData === 'object') {
                            if (confirm("Overwrite current data with imported file?")) {
                                let newChecklist = importedData.checklist || importedData; // fallback
                                let newProject = importedData.project || DEFAULT_PROJECT_DETAILS;
                                
                                setChecklistData(newChecklist);
                                setProjectDetails(newProject);
                                
                                // Save immediately to cloud
                                if(user) saveToFirebase(newChecklist, newProject, user.uid);
                                alert("Import successful!");
                            }
                        } else {
                            alert("Invalid file format.");
                        }
                    } catch (error) {
                        console.error("Import error:", error);
                        alert("Failed to parse JSON.");
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Header
                doc.setFontSize(22);
                doc.setTextColor(41, 128, 185); 
                doc.text("Deep Dive: TVA & Coupling Review", 14, 20);
                
                doc.setFontSize(10);
                doc.setTextColor(100);
                doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 26);
                
                // Project Details
                doc.setDrawColor(200);
                doc.setFillColor(245, 247, 250);
                doc.rect(14, 32, 182, 50, 'F');
                
                doc.setFontSize(11);
                doc.setTextColor(0);
                doc.setFont(undefined, 'bold');
                doc.text("Project Information", 18, 40);
                doc.setFont(undefined, 'normal');
                doc.setFontSize(10);
                
                doc.text(`End Customer: ${projectDetails.endCustomer}`, 18, 48);
                doc.text(`Project Name: ${projectDetails.project}`, 18, 54);
                doc.text(`Specs: ${projectDetails.specifications}`, 18, 60);
                doc.text(`Train Config: ${projectDetails.configuration}`, 18, 66);
                
                doc.text(`Service: ${projectDetails.service}`, 110, 48);
                doc.text(`Manufacturer: ${projectDetails.manufacturer}`, 110, 54);
                doc.text(`Model: ${projectDetails.model}`, 110, 60);

                let yPos = 90;

                Object.values(checklistData).forEach(section => {
                    if (yPos > 270) { doc.addPage(); yPos = 20; }
                    doc.setFontSize(14);
                    doc.setTextColor(0);
                    doc.setFont(undefined, 'bold');
                    doc.text(section.title, 14, yPos);
                    yPos += 5;

                    const tableData = section.items.map(item => [
                        item.label,
                        item.requirement,
                        item.status.toUpperCase(),
                        item.notes || "-"
                    ]);

                    doc.autoTable({
                        startY: yPos,
                        head: [['Item', 'Requirement', 'Status', 'Notes']],
                        body: tableData,
                        theme: 'grid',
                        headStyles: { fillColor: [41, 128, 185], textColor: 255 },
                        styles: { fontSize: 8, cellPadding: 2 },
                        columnStyles: { 0: { cellWidth: 40 }, 1: { cellWidth: 50 }, 2: { cellWidth: 20 }, 3: { cellWidth: 'auto' } },
                        didDrawPage: (data) => { yPos = data.cursor.y + 15; }
                    });
                    yPos = doc.lastAutoTable.finalY + 15;
                });

                doc.save(`TVA_Review_${projectDetails.project || 'Report'}.pdf`);
            };

            const exportExcel = () => {
                const projectData = [
                    { Field: "End Customer", Value: projectDetails.endCustomer },
                    { Field: "Project Name", Value: projectDetails.project },
                    { Field: "Review Date", Value: new Date().toLocaleString() }
                ];
                const flattenedData = [];
                Object.values(checklistData).forEach(section => {
                    section.items.forEach(item => {
                        flattenedData.push({
                            Section: section.title,
                            Category: item.category,
                            Item: item.label,
                            Requirement: item.requirement,
                            Status: item.status.toUpperCase(),
                            Notes: item.notes
                        });
                    });
                });

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(projectData), "Info");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(flattenedData), "Checklist");
                XLSX.writeFile(wb, `TVA_Review_${projectDetails.project || 'Data'}.xlsx`);
            };

            // --- SEARCH LOGIC ---
            const getSearchResults = () => {
                if (!searchQuery.trim()) return null;
                const lowerQuery = searchQuery.toLowerCase();
                const terms = lowerQuery.split(/\s+/).filter(t => t.length > 0);
                const results = [];
                Object.entries(checklistData).forEach(([key, section]) => {
                    const matchingItems = section.items.filter(item => {
                        const textContent = `${item.label} ${item.requirement} ${item.insight} ${item.category} ${item.notes || ''}`.toLowerCase();
                        return terms.every(term => textContent.includes(term));
                    });
                    if (matchingItems.length > 0) results.push({ ...section, items: matchingItems, originalKey: key });
                });
                return results;
            };

            // --- HANDLERS ---
            const handleCheck = (sectionKey, itemId) => {
                setChecklistData(prev => {
                    const newData = JSON.parse(JSON.stringify(prev));
                    const item = newData[sectionKey].items.find(i => i.id === itemId);
                    if(item) {
                        item.checked = !item.checked;
                        item.status = item.checked ? 'compliant' : 'pending';
                    }
                    return newData;
                });
            };

            const handleStatusChange = (sectionKey, itemId, newStatus) => {
                setChecklistData(prev => {
                    const newData = JSON.parse(JSON.stringify(prev));
                    const item = newData[sectionKey].items.find(i => i.id === itemId);
                    if(item) item.status = newStatus;
                    return newData;
                });
            };

            const handleNoteChange = (sectionKey, itemId, note) => {
                setChecklistData(prev => {
                    const newData = JSON.parse(JSON.stringify(prev));
                    const item = newData[sectionKey].items.find(i => i.id === itemId);
                    if(item) item.notes = note;
                    return newData;
                });
            };

            const handleAddSection = (e) => {
                e.preventDefault();
                const newId = `custom_${Date.now()}`;
                setChecklistData(prev => ({
                    ...prev,
                    [newId]: { id: newId, title: newSectionData.title, iconKey: newSectionData.iconKey, isCustom: true, items: [] }
                }));
                setActiveSection(newId);
                setIsSectionModalOpen(false);
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                setChecklistData(prev => {
                    const newData = JSON.parse(JSON.stringify(prev));
                    newData[activeSection].items.push({
                        id: `item_${Date.now()}`,
                        category: newItemData.category || "General",
                        label: newItemData.label,
                        requirement: newItemData.requirement,
                        insight: newItemData.insight,
                        checked: false, status: "pending", notes: "", isCustom: true
                    });
                    return newData;
                });
                setIsItemModalOpen(false);
            };

            const ActiveIcon = Icons[checklistData[activeSection]?.iconKey || 'Shield'];
            const searchResults = getSearchResults();

            return (
                <div className="p-6 max-w-7xl mx-auto">
                    
                    {/* Hidden Input for Import */}
                    <input type="file" ref={fileInputRef} onChange={handleImportFile} className="hidden" accept=".json" />

                    {/* Header */}
                    <header className="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <div className="flex flex-col gap-4">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <div className="flex items-center gap-2">
                                        <a href="index.html" className="text-slate-400 hover:text-blue-600 transition-colors text-sm font-medium">← Dashboard</a>
                                        <span className="text-slate-300">/</span>
                                        <h1 className="text-2xl font-bold text-slate-900">TVA Deep Review</h1>
                                    </div>
                                    <div className="flex items-center gap-2 mt-1">
                                        <p className="text-slate-500 text-sm">Cloud Synced Tool</p>
                                        {saving ? 
                                            <span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full flex items-center gap-1"><span className="animate-pulse">●</span> Saving...</span> : 
                                            <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">● Saved</span>
                                        }
                                    </div>
                                </div>
                                
                                {/* Search */}
                                <div className="relative w-full md:w-96 group">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500">
                                        <Icons.Search />
                                    </div>
                                    <input
                                        type="text"
                                        className="block w-full pl-10 pr-10 py-2 border border-slate-300 rounded-lg leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all shadow-sm sm:text-sm"
                                        placeholder="Search requirements..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                    {searchQuery && (
                                        <button onClick={() => setSearchQuery("")} className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                            <Icons.X />
                                        </button>
                                    )}
                                </div>
                            </div>
                            
                            {/* Actions Toolbar */}
                            <div className="flex flex-col md:flex-row justify-end items-center gap-4 pt-2 border-t border-slate-100 mt-2">
                                <div className="flex flex-wrap items-center gap-2 justify-end w-full">
                                    <button onClick={handleImportClick} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors border border-slate-200">
                                        <Icons.Upload /> Import
                                    </button>
                                    <button onClick={exportJSON} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors border border-blue-200">
                                        <Icons.Download /> Backup
                                    </button>
                                    <button onClick={resetData} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors border border-red-200">
                                        <Icons.RotateCcw /> Reset
                                    </button>
                                    <div className="h-6 w-px bg-slate-200 mx-1 hidden md:block"></div>
                                    <button onClick={exportExcel} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-green-700 bg-green-50 hover:bg-green-100 rounded-lg transition-colors border border-green-200">
                                        <Icons.Table /> Excel
                                    </button>
                                    <button onClick={exportPDF} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm">
                                        <Icons.FileText /> PDF Report
                                    </button>
                                </div>
                                
                                <div className="flex items-center gap-3 w-full md:w-auto min-w-[200px] justify-end">
                                    <span className="text-xs font-bold text-slate-500 whitespace-nowrap">{progress}% Reviewed</span>
                                    <div className="w-32 h-2 bg-slate-100 rounded-full overflow-hidden flex-shrink-0">
                                        <div className="h-full bg-blue-600 transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Project Info */}
                    {!searchQuery && (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                         <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wide mb-4 border-b border-slate-100 pb-2 flex items-center gap-2">
                            <Icons.Info /> Project Details
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {['endCustomer', 'project', 'manufacturer', 'model', 'specifications'].map(field => (
                                <div key={field}>
                                    <label className="block text-xs font-medium text-slate-500 mb-1 capitalize">{field.replace(/([A-Z])/g, ' $1').trim()}</label>
                                    <input 
                                        type="text" 
                                        value={projectDetails[field]}
                                        onChange={(e) => setProjectDetails({...projectDetails, [field]: e.target.value})}
                                        className="w-full text-sm p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500 outline-none"
                                    />
                                </div>
                            ))}
                            <div>
                                <label className="block text-xs font-medium text-slate-500 mb-1">Configuration</label>
                                <select 
                                    value={projectDetails.configuration}
                                    onChange={(e) => setProjectDetails({...projectDetails, configuration: e.target.value})}
                                    className="w-full text-sm p-2 border border-slate-300 rounded focus:ring-1 focus:ring-blue-500 outline-none bg-white"
                                >
                                    {TRAIN_CONFIGURATIONS.map(cfg => <option key={cfg} value={cfg}>{cfg}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>
                    )}

                    {/* Main Content Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        
                        {/* Sidebar */}
                        <nav className="lg:col-span-1 space-y-2">
                            {Object.entries(checklistData).map(([key, section]) => {
                                const SectionIcon = Icons[section.iconKey] || Icons.Shield;
                                return (
                                    <button
                                        key={key}
                                        onClick={() => { setActiveSection(key); setSearchQuery(""); }}
                                        className={`w-full flex items-center gap-3 p-3 rounded-lg text-left transition-colors ${
                                            activeSection === key && !searchQuery
                                            ? 'bg-blue-600 text-white shadow-md' 
                                            : 'bg-white text-slate-600 hover:bg-slate-100 border border-transparent hover:border-slate-200'
                                        }`}
                                    >
                                        <SectionIcon />
                                        <span className="font-medium text-sm">{section.title}</span>
                                    </button>
                                );
                            })}
                            <button onClick={() => setIsSectionModalOpen(true)} className="w-full py-3 mt-4 text-sm text-slate-500 border-2 border-dashed border-slate-300 rounded-lg hover:border-blue-400 hover:text-blue-500 transition-colors">
                                + Add Section
                            </button>
                            
                            <div className="mt-8 p-4 bg-amber-50 rounded-lg border border-amber-100 shadow-sm">
                                <h3 className="text-sm font-bold text-amber-800 mb-2 flex items-center gap-2">
                                    <Icons.AlertTriangle /> Critical Reminder
                                </h3>
                                <p className="text-xs text-amber-700 leading-relaxed mb-2">
                                    <strong>Separation Margins:</strong> If TNFs fall within 10% of operating speed, a Damped Response Analysis is MANDATORY per API 617.
                                </p>
                            </div>
                        </nav>

                        {/* Checklist */}
                        <div className="lg:col-span-3 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            
                            {/* SEARCH RESULTS VIEW */}
                            {searchQuery ? (
                                <div>
                                    <div className="p-4 bg-blue-50 border-b border-blue-100">
                                        <h2 className="font-bold text-blue-900">
                                            Found {searchResults ? searchResults.reduce((acc, curr) => acc + curr.items.length, 0) : 0} matches
                                        </h2>
                                    </div>
                                    {searchResults && searchResults.map(section => (
                                        <div key={section.id} className="border-b border-slate-100 last:border-0">
                                            <div className="px-6 py-2 bg-slate-50 text-xs font-bold text-slate-500 uppercase tracking-wider">
                                                Found in: {section.title}
                                            </div>
                                            {section.items.map(item => (
                                                <div key={item.id} className="p-6 hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                                                    {/* Render Item (Simplified for brevity, reusing structure) */}
                                                    <div className="flex items-start gap-4">
                                                        <button onClick={() => handleCheck(section.originalKey, item.id)} className={`mt-1 flex-shrink-0 w-6 h-6 rounded border-2 flex items-center justify-center transition-all ${item.checked ? 'bg-blue-600 border-blue-600' : 'border-slate-300 hover:border-blue-400'}`}>
                                                            {item.checked && <Icons.CheckCircle className="text-white w-4 h-4" />}
                                                        </button>
                                                        <div className="flex-1">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div>
                                                                    <span className="text-xs font-semibold bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{item.category}</span>
                                                                    <h3 className="text-base font-bold text-slate-800 mt-1">{item.label}</h3>
                                                                </div>
                                                                <select value={item.status} onChange={(e) => handleStatusChange(section.originalKey, item.id, e.target.value)} className={`text-xs font-bold uppercase rounded px-2 py-1 border-0 focus:ring-0 cursor-pointer ${item.status === 'compliant' ? 'bg-green-100 text-green-700' : item.status === 'deviation' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>
                                                                    <option value="pending">Pending</option><option value="compliant">Compliant</option><option value="deviation">Deviation</option>
                                                                </select>
                                                            </div>
                                                            <p className="text-sm text-slate-600 mb-2"><strong className="text-slate-900">Req:</strong> {item.requirement}</p>
                                                            <textarea value={item.notes} onChange={(e) => handleNoteChange(section.originalKey, item.id, e.target.value)} placeholder="Observations..." className="w-full text-sm p-2 bg-white border border-slate-200 rounded focus:border-blue-500 outline-none" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                /* NORMAL VIEW */
                                checklistData[activeSection] && (
                                <>
                                    <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <ActiveIcon /> {checklistData[activeSection].title}
                                        </h2>
                                        <button onClick={() => setIsItemModalOpen(true)} className="px-3 py-1.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded shadow-sm">
                                            + Add Item
                                        </button>
                                    </div>

                                    <div className="divide-y divide-slate-100">
                                        {checklistData[activeSection].items.map((item) => (
                                            <div key={item.id} className="p-6 hover:bg-slate-50 transition-colors group">
                                                <div className="flex items-start gap-4">
                                                    <button onClick={() => handleCheck(activeSection, item.id)}
                                                        className={`mt-1 flex-shrink-0 w-6 h-6 rounded border-2 flex items-center justify-center transition-all ${
                                                            item.checked ? 'bg-blue-600 border-blue-600' : 'border-slate-300 hover:border-blue-400'
                                                        }`}
                                                    >
                                                        {item.checked && <Icons.CheckCircle className="text-white w-4 h-4" />}
                                                    </button>

                                                    <div className="flex-1">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div>
                                                                <span className="text-xs font-semibold bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{item.category}</span>
                                                                <h3 className="text-base font-bold text-slate-800 mt-1">{item.label}</h3>
                                                            </div>
                                                            <select
                                                                value={item.status}
                                                                onChange={(e) => handleStatusChange(activeSection, item.id, e.target.value)}
                                                                className={`text-xs font-bold uppercase rounded px-2 py-1 border-0 focus:ring-0 cursor-pointer ${
                                                                    item.status === 'compliant' ? 'bg-green-100 text-green-700' :
                                                                    item.status === 'deviation' ? 'bg-red-100 text-red-700' :
                                                                    'bg-slate-100 text-slate-500'
                                                                }`}
                                                            >
                                                                <option value="pending">Pending</option>
                                                                <option value="compliant">Compliant</option>
                                                                <option value="deviation">Deviation</option>
                                                            </select>
                                                        </div>

                                                        <p className="text-sm text-slate-600 mb-2"><strong className="text-slate-900">Req:</strong> {item.requirement}</p>
                                                        {item.insight && <p className="text-xs text-blue-600 bg-blue-50 p-2 rounded mb-3 flex items-start gap-1"><Icons.Info /> {item.insight}</p>}

                                                        <textarea
                                                            value={item.notes}
                                                            onChange={(e) => handleNoteChange(activeSection, item.id, e.target.value)}
                                                            placeholder="Observations..."
                                                            className="w-full text-sm p-2 bg-white border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none h-16"
                                                        />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {checklistData[activeSection].items.length === 0 && <div className="p-8 text-center text-slate-400">No items yet.</div>}
                                    </div>
                                </>
                            ))}
                        </div>
                    </div>

                    {/* Add Section Modal */}
                    <Modal isOpen={isSectionModalOpen} onClose={() => setIsSectionModalOpen(false)} title="New Section">
                        <form onSubmit={handleAddSection} className="space-y-4">
                            <input autoFocus type="text" placeholder="Section Title" required className="w-full p-2 border rounded" value={newSectionData.title} onChange={e => setNewSectionData({...newSectionData, title: e.target.value})} />
                            <div className="flex justify-end gap-2 pt-2">
                                <button type="button" onClick={() => setIsSectionModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded">Cancel</button>
                                <button type="submit" className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Create</button>
                            </div>
                        </form>
                    </Modal>

                    {/* Add Item Modal */}
                    <Modal isOpen={isItemModalOpen} onClose={() => setIsItemModalOpen(false)} title="New Check Point">
                        <form onSubmit={handleAddItem} className="space-y-3">
                            <input autoFocus type="text" placeholder="Label (e.g. VFD Check)" required className="w-full p-2 border rounded" value={newItemData.label} onChange={e => setNewItemData({...newItemData, label: e.target.value})} />
                            <input type="text" placeholder="Category (e.g. General)" className="w-full p-2 border rounded" value={newItemData.category} onChange={e => setNewItemData({...newItemData, category: e.target.value})} />
                            <textarea placeholder="Requirement" required className="w-full p-2 border rounded" value={newItemData.requirement} onChange={e => setNewItemData({...newItemData, requirement: e.target.value})} />
                            <div className="flex justify-end gap-2 pt-2">
                                <button type="button" onClick={() => setIsItemModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded">Cancel</button>
                                <button type="submit" className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Add</button>
                            </div>
                        </form>
                    </Modal>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TVAReviewTool />);
    </script>
</body>
</html>
