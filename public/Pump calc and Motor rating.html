<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pump Power Calculator (Cloud)</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151f2e' },
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    },
                    fontFamily: { sans: ['Instrument Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Loader */
        .loader { border: 2px solid #e2e8f0; border-top: 2px solid #0ea5e9; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

    <!-- 1. GLOBAL NAVIGATION -->
    <div id="global-nav"></div>

    <!-- 2. MAIN APP -->
    <div id="root" class="flex-1"></div>

    <!-- 3. REQUIRED FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- 4. EMBEDDED CONFIG & CORE -->
    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqGx_Skjp_RKxIK-pHRGOlp22uLJdy6WE",
            authDomain: "my-app-hub-69db8.firebaseapp.com",
            projectId: "my-app-hub-69db8",
            storageBucket: "my-app-hub-69db8.firebasestorage.app",
            messagingSenderId: "709494807607",
            appId: "1:709494807607:web:e8cdafc2511ab6e354b3b2",
            measurementId: "G-KWWNJDP8LY"
        };
        Object.freeze(firebaseConfig);

        // --- APP CORE ENGINE ---
        class AppCore {
            constructor() {
                this.user = null;
                this.db = null;
                this.auth = null;
                this.globalState = { theme: 'light' };
                this.stateListeners = [];
            }

            async init() {
                if (typeof firebase === 'undefined') return;
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                this.auth = firebase.auth();
                this.db = firebase.firestore();

                try {
                    await this.db.enablePersistence();
                    console.log("🔌 Offline mode enabled");
                } catch (err) { console.log("Persistence disabled:", err.code); }

                this.injectStyles();
                this.setupAuth();
            }

            setupAuth() {
                this.auth.onAuthStateChanged(user => {
                    this.user = user;
                    if (user) {
                        this.connectGlobalStore();
                        this.renderNav(); 
                        if (this.onLogin) this.onLogin(user);
                    } else {
                        this.renderNav();
                    }
                });
            }

            connectGlobalStore() {
                if (!this.user) return;
                this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            this.globalState = { ...this.globalState, ...doc.data() };
                            this.notifyListeners();
                            this.applyTheme(this.globalState.theme);
                        }
                    });
            }

            async updateGlobalStore(data) {
                if (!this.user) return;
                await this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store').set(
                    { ...data, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, 
                    { merge: true }
                );
            }

            subscribe(cb) { this.stateListeners.push(cb); cb(this.globalState); }
            notifyListeners() { this.stateListeners.forEach(cb => cb(this.globalState)); }

            injectStyles() {
                if(typeof tailwind !== 'undefined') {
                    tailwind.config = {
                        darkMode: 'class',
                        theme: { extend: { fontFamily: { sans: ['Instrument Sans', 'sans-serif'] } } }
                    }
                }
            }

            applyTheme(theme) {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }

            toggleTheme() {
                const newTheme = this.globalState.theme === 'dark' ? 'light' : 'dark';
                this.updateGlobalStore({ theme: newTheme });
            }

            renderNav() {
                const navContainer = document.getElementById('global-nav');
                if (!navContainer) return;
                const email = this.user ? (this.user.email || 'Anonymous') : 'Not Logged In';
                const avatar = email.charAt(0).toUpperCase();

                navContainer.innerHTML = `
                    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-slate-800 dark:text-white hover:opacity-80 transition">
                                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">A</div>
                                <span>App Hub</span>
                            </a>
                            <div class="flex items-center gap-4">
                                <div id="global-status" class="hidden md:flex text-xs px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-slate-500">
                                    ${this.user ? '🟢 Synced' : '⚪ Offline'}
                                </div>
                                <button onclick="window.Core.toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                                    ${this.globalState.theme === 'dark' ? '🌙' : '☀️'}
                                </button>
                                <div class="relative group cursor-pointer">
                                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 text-white flex items-center justify-center font-bold shadow-sm">
                                        ${this.user ? avatar : '?'}
                                    </div>
                                    <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 py-1 hidden group-hover:block">
                                        <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                                            <p class="text-xs text-slate-500">Signed in as</p>
                                            <p class="text-sm font-medium truncate text-slate-900 dark:text-slate-100">${email}</p>
                                        </div>
                                        ${this.user ? '<button onclick="firebase.auth().signOut()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">Sign Out</button>' : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>
                `;
            }

            onLogin(user) {} 
        }

        window.Core = new AppCore();
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => window.Core.init());
        else window.Core.init();
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- Constants & Helpers ---
        const IEC_RATINGS_KW = [
            0.06, 0.09, 0.12, 0.18, 0.25, 0.37, 0.55, 0.75, 1.1, 1.5, 2.2, 3, 4, 5.5, 7.5, 
            11, 15, 18.5, 22, 30, 37, 45, 55, 75, 90, 110, 132, 160, 200, 250, 315, 355, 
            400, 450, 500, 560, 630, 710, 800, 900, 1000
        ];
        const NEMA_RATINGS_HP = [
            0.25, 0.33, 0.5, 0.75, 1, 1.5, 2, 3, 5, 7.5, 10, 15, 20, 25, 30, 40, 50, 
            60, 75, 100, 125, 150, 200, 250, 300, 350, 400, 450, 500
        ];
        const GRAVITY = 9.80665;

        // --- Components ---
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden ${className}`}>
                {children}
            </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", icon }) => {
            const baseStyle = "flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all text-sm focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-slate-900";
            const variants = {
                primary: "bg-brand-600 hover:bg-brand-700 text-white shadow-lg shadow-brand-500/30 focus:ring-brand-500",
                secondary: "bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 focus:ring-slate-500",
                danger: "bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 border border-transparent"
            };
            return (
                <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {icon && <Icon name={icon} size={16} />}
                    {children}
                </button>
            );
        };

        const InputGroup = ({ label, id, value, onChange, type = "text", step, min, options, unitValue, onUnitChange, className }) => (
            <div className={`flex flex-col ${className}`}>
                <label className="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5" htmlFor={id}>
                    {label}
                </label>
                <div className="flex rounded-lg shadow-sm">
                    <input
                        id={id}
                        type={type}
                        step={step}
                        min={min}
                        value={value}
                        onChange={onChange}
                        className="flex-1 min-w-0 block w-full px-3 py-2 rounded-l-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                    />
                    {options && (
                        <select
                            value={unitValue}
                            onChange={onUnitChange}
                            className="inline-flex items-center px-3 py-2 border border-l-0 border-slate-300 dark:border-slate-600 rounded-r-lg bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-300 text-sm focus:ring-brand-500 focus:border-brand-500"
                        >
                            {options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                        </select>
                    )}
                    {!options && (
                        <div className="inline-flex items-center px-3 py-2 border border-l-0 border-slate-300 dark:border-slate-600 rounded-r-lg bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-300 text-sm">
                            <span className="text-xs">{unitValue}</span>
                        </div>
                    )}
                </div>
            </div>
        );

        // --- Main App Component ---
        const App = () => {
            const [unitSystem, setUnitSystem] = useState("SI");
            const [project, setProject] = useState({ name: "", tag: "", service: "" });
            const [inputs, setInputs] = useState({ flow: 100, flowUnit: "m3h", head: 50, headUnit: "m", sg: 1.0, eff: 70 });
            const [history, setHistory] = useState([]);
            const [saveStatus, setSaveStatus] = useState("idle"); // idle, saving, saved, error
            const [user, setUser] = useState(null);
            
            const saveTimeoutRef = useRef(null);

            // --- Authentication & Data Loading ---
            useEffect(() => {
                const checkAuth = setInterval(() => {
                    if (window.Core && window.Core.user) {
                        setUser(window.Core.user);
                        clearInterval(checkAuth);
                        loadData(window.Core.user.uid);
                    }
                }, 500);
                return () => clearInterval(checkAuth);
            }, []);

            // --- Firestore Functions ---
            const loadData = (uid) => {
                if(!window.Core || !window.Core.db) return;
                const docRef = window.Core.db.collection('users').doc(uid).collection('app_data').doc('pump_tool');
                
                docRef.get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if(data.unitSystem) setUnitSystem(data.unitSystem);
                        if(data.project) setProject(data.project);
                        if(data.inputs) setInputs(data.inputs);
                        if(data.history) setHistory(data.history);
                    } else {
                        // First time? Save default
                        saveData(uid);
                    }
                }).catch(err => console.error("Load Error:", err));
            };

            const saveData = async (uid = user?.uid) => {
                if(!window.Core || !window.Core.db || !uid) return;
                setSaveStatus("saving");
                try {
                    await window.Core.db.collection('users').doc(uid).collection('app_data').doc('pump_tool').set({
                        unitSystem,
                        project,
                        inputs,
                        history,
                        lastModified: new Date().toISOString()
                    }, { merge: true });
                    setSaveStatus("saved");
                    setTimeout(() => setSaveStatus("idle"), 2000);
                } catch(e) {
                    console.error("Save failed", e);
                    setSaveStatus("error");
                }
            };

            // Debounced Save
            useEffect(() => {
                if(user) {
                    if(saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                    setSaveStatus("saving"); // Optimistic UI
                    saveTimeoutRef.current = setTimeout(() => {
                        saveData();
                    }, 2000);
                }
            }, [unitSystem, project, inputs, history, user]);

            // --- Logic ---
            const handleUnitSystemChange = (system) => {
                setUnitSystem(system);
                if (system === "US") {
                    setInputs(prev => ({ ...prev, flowUnit: "gpm", headUnit: "ft" }));
                } else {
                    setInputs(prev => ({ ...prev, flowUnit: "m3h", headUnit: "m" }));
                }
            };

            const calculation = useMemo(() => {
                const { flow, flowUnit, head, headUnit, sg, eff } = inputs;
                let Q_m3s = 0;
                const flowVal = Number(flow);
                switch(flowUnit) {
                    case "m3h": Q_m3s = flowVal / 3600; break;
                    case "m3min": Q_m3s = flowVal / 60; break;
                    case "Ls": Q_m3s = flowVal / 1000; break;
                    case "gpm": Q_m3s = flowVal * 0.0000630901964; break;
                    default: Q_m3s = flowVal; // m3s
                }

                let H_m = 0;
                const headVal = Number(head);
                switch(headUnit) {
                    case "ft": H_m = headVal * 0.3048; break;
                    default: H_m = headVal; 
                }

                const P_hyd_kW = Number(sg) * GRAVITY * Q_m3s * H_m;
                const effDecimal = Math.max(0.01, Number(eff) / 100);
                const P_shaft_kW = P_hyd_kW / effDecimal;

                let sf = 1.0;
                if (P_shaft_kW < 22) sf = 1.25;
                else if (P_shaft_kW <= 55) sf = 1.15;
                else sf = 1.10;

                const P_rated_req_kW = P_shaft_kW * sf;
                const selectedIEC = IEC_RATINGS_KW.find(r => r >= P_rated_req_kW) || Math.ceil(P_rated_req_kW/10)*10;
                
                const P_rated_req_HP = P_rated_req_kW * 1.34102;
                const selectedNEMA = NEMA_RATINGS_HP.find(r => r >= P_rated_req_HP) || Math.ceil(P_rated_req_HP/10)*10;

                return { P_hyd_kW, P_shaft_kW, sf, P_rated_req_kW, selectedIEC, selectedNEMA };
            }, [inputs]);

            const addToHistory = () => {
                const newEntry = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString(),
                    project: project.name || "Untitled",
                    tag: project.tag || "-",
                    service: project.service || "-",
                    flow: `${inputs.flow} ${inputs.flowUnit}`,
                    head: `${inputs.head} ${inputs.headUnit}`,
                    eff: inputs.eff,
                    powerShaft: unitSystem === 'US' ? (calculation.P_shaft_kW * 1.341).toFixed(2) + ' hp' : calculation.P_shaft_kW.toFixed(2) + ' kW',
                    motorSize: unitSystem === 'US' ? calculation.selectedNEMA + ' hp' : calculation.selectedIEC + ' kW'
                };
                setHistory([newEntry, ...history]);
            };

            const exportCSV = () => {
                if (history.length === 0) return alert("No data to export!");
                const headers = ["Date", "Project", "Tag", "Service", "Flow", "Head", "Efficiency (%)", "Shaft Power", "Recommended Motor"];
                const csvContent = [headers.join(","), ...history.map(row => [row.date, `"${row.project}"`, `"${row.tag}"`, `"${row.service}"`, row.flow, row.head, row.eff, row.powerShaft, row.motorSize].join(","))].join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `pump_calculations_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const ResultRow = ({ label, value, subtext, highlight }) => (
                <div className={`flex justify-between items-center py-2 border-b border-slate-100 dark:border-slate-700 last:border-0 ${highlight ? 'bg-brand-50 dark:bg-brand-900/20 -mx-4 px-4 rounded' : ''}`}>
                    <div>
                        <span className={`text-sm ${highlight ? 'font-semibold text-brand-700 dark:text-brand-300' : 'text-slate-600 dark:text-slate-400'}`}>{label}</span>
                        {subtext && <p className="text-xs text-slate-400">{subtext}</p>}
                    </div>
                    <span className={`font-mono font-medium ${highlight ? 'text-brand-700 dark:text-brand-300 text-lg' : 'text-slate-800 dark:text-slate-200'}`}>{value}</span>
                </div>
            );

            return (
                <div className="p-4 sm:p-8 font-sans max-w-6xl mx-auto space-y-6">
                    {/* Header */}
                    <header className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                                <div className="bg-brand-600 text-white p-2 rounded-lg"><Icon name="activity" size={28} /></div>
                                Pump Power Calculator
                            </h1>
                            <div className="flex items-center gap-2 mt-1">
                                <p className="text-slate-500 dark:text-slate-400 text-sm">API 610 / ISO 13709 Standard</p>
                                <span className={`text-xs px-2 py-0.5 rounded-full flex items-center gap-1 ${
                                    saveStatus === 'saved' ? 'bg-green-100 text-green-700' :
                                    saveStatus === 'saving' ? 'bg-amber-100 text-amber-700' : 
                                    saveStatus === 'error' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'
                                }`}>
                                    {saveStatus === 'saving' ? <><span className="loader"></span> Saving</> : 
                                     saveStatus === 'saved' ? '● Saved' : saveStatus === 'error' ? 'Offline' : 'Ready'}
                                </span>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3 bg-white dark:bg-slate-800 p-1.5 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                            <button onClick={() => handleUnitSystemChange('SI')} className={`px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${unitSystem === 'SI' ? 'bg-brand-100 text-brand-700 dark:bg-brand-900 dark:text-brand-300' : 'text-slate-500 hover:text-slate-900 dark:hover:text-slate-300'}`}>Metric (SI)</button>
                            <button onClick={() => handleUnitSystemChange('US')} className={`px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${unitSystem === 'US' ? 'bg-brand-100 text-brand-700 dark:bg-brand-900 dark:text-brand-300' : 'text-slate-500 hover:text-slate-900 dark:hover:text-slate-300'}`}>US Units</button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* Inputs */}
                        <div className="lg:col-span-7 space-y-6">
                            <Card className="p-5">
                                <div className="flex items-center gap-2 mb-4 text-brand-600 dark:text-brand-400">
                                    <Icon name="folder" size={20} />
                                    <h2 className="font-semibold text-lg text-slate-900 dark:text-white">Project Details</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <InputGroup label="Project Name" id="projName" value={project.name} onChange={(e) => setProject({...project, name: e.target.value})} unitValue="Text" />
                                    <InputGroup label="Pump Tag" id="pumpTag" value={project.tag} onChange={(e) => setProject({...project, tag: e.target.value})} unitValue="Ref" />
                                    <InputGroup label="Service" id="service" value={project.service} onChange={(e) => setProject({...project, service: e.target.value})} unitValue="Ref" />
                                </div>
                            </Card>

                            <Card className="p-5">
                                <div className="flex items-center gap-2 mb-4 text-brand-600 dark:text-brand-400">
                                    <Icon name="sliders" size={20} />
                                    <h2 className="font-semibold text-lg text-slate-900 dark:text-white">Process Inputs</h2>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    <InputGroup label="Volumetric Flow" id="flow" type="number" value={inputs.flow} onChange={(e) => setInputs({...inputs, flow: e.target.value})} options={[{value: 'm3h', label: 'm³/h'},{value: 'm3s', label: 'm³/s'},{value: 'm3min', label: 'm³/min'},{value: 'Ls', label: 'L/s'},{value: 'gpm', label: 'gpm (US)'}]} unitValue={inputs.flowUnit} onUnitChange={(e) => setInputs({...inputs, flowUnit: e.target.value})} />
                                    <InputGroup label="Differential Head" id="head" type="number" value={inputs.head} onChange={(e) => setInputs({...inputs, head: e.target.value})} options={[{value: 'm', label: 'm'},{value: 'ft', label: 'ft'}]} unitValue={inputs.headUnit} onUnitChange={(e) => setInputs({...inputs, headUnit: e.target.value})} />
                                    <InputGroup label="Specific Gravity (SG)" id="sg" type="number" step="0.01" value={inputs.sg} onChange={(e) => setInputs({...inputs, sg: e.target.value})} unitValue="Rel" />
                                    <InputGroup label="Pump Efficiency" id="eff" type="number" step="0.1" min="1" max="100" value={inputs.eff} onChange={(e) => setInputs({...inputs, eff: e.target.value})} unitValue="%" />
                                </div>
                                <div className="mt-4 p-3 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 text-xs rounded-lg flex items-start gap-2">
                                    <Icon name="info" size={16} className="mt-0.5 shrink-0" />
                                    <div><strong>API 610 Service Factors applied automatically:</strong> &lt; 22 kW: 1.25, 22-55 kW: 1.15, &gt; 55 kW: 1.10</div>
                                </div>
                            </Card>
                        </div>

                        {/* Results */}
                        <div className="lg:col-span-5 space-y-6">
                            <Card className="h-full border-brand-200 dark:border-brand-800 ring-4 ring-brand-50 dark:ring-brand-900/10">
                                <div className="bg-brand-50 dark:bg-brand-900/30 p-4 border-b border-brand-100 dark:border-brand-800 flex justify-between items-center">
                                    <div className="flex items-center gap-2 text-brand-700 dark:text-brand-300"><Icon name="zap" size={20} /><h2 className="font-bold">Results</h2></div>
                                    <span className="text-xs font-mono text-brand-600 dark:text-brand-400 opacity-70">REAL-TIME</span>
                                </div>
                                <div className="p-5 space-y-1">
                                    <ResultRow label="Hydraulic Power" value={unitSystem === 'US' ? `${(calculation.P_hyd_kW * 1.341).toFixed(2)} hp` : `${calculation.P_hyd_kW.toFixed(2)} kW`} />
                                    <ResultRow label="Shaft Power" subtext={`@ ${inputs.eff}% efficiency`} value={unitSystem === 'US' ? `${(calculation.P_shaft_kW * 1.341).toFixed(2)} hp` : `${calculation.P_shaft_kW.toFixed(2)} kW`} />
                                    <ResultRow label="Service Factor" value={calculation.sf.toFixed(2)} />
                                    <ResultRow label="Req. Rated Power" subtext="Incl. Service Factor" value={unitSystem === 'US' ? `${(calculation.P_rated_req_kW * 1.341).toFixed(2)} hp` : `${calculation.P_rated_req_kW.toFixed(2)} kW`} highlight />
                                    <div className="my-4 border-t border-dashed border-slate-300 dark:border-slate-600"></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className={`p-3 rounded-lg border ${unitSystem === 'SI' ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                                            <div className="text-xs text-slate-500 dark:text-slate-400 mb-1">IEC Standard</div>
                                            <div className="text-2xl font-bold text-slate-900 dark:text-white">{calculation.selectedIEC} <span className="text-sm font-normal text-slate-500">kW</span></div>
                                        </div>
                                        <div className={`p-3 rounded-lg border ${unitSystem === 'US' ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                                            <div className="text-xs text-slate-500 dark:text-slate-400 mb-1">NEMA Standard</div>
                                            <div className="text-2xl font-bold text-slate-900 dark:text-white">{calculation.selectedNEMA} <span className="text-sm font-normal text-slate-500">hp</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                                    <Button onClick={addToHistory} icon="plus-circle">Add to Table</Button>
                                </div>
                            </Card>
                        </div>
                    </div>

                    {/* Table */}
                    <Card className="overflow-hidden flex flex-col">
                        <div className="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800">
                            <h3 className="font-semibold text-slate-900 dark:text-white flex items-center gap-2">
                                <Icon name="database" size={18} className="text-slate-400" /> Saved Calculations
                                <span className="bg-slate-200 dark:bg-slate-600 text-slate-600 dark:text-slate-200 text-xs py-0.5 px-2 rounded-full">{history.length}</span>
                            </h3>
                            <div className="flex gap-2">
                                <Button variant="secondary" onClick={() => setHistory([])} className="text-xs h-8">Clear All</Button>
                                <Button variant="secondary" onClick={exportCSV} icon="download" className="text-xs h-8">Export CSV</Button>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm text-slate-600 dark:text-slate-400">
                                <thead className="bg-slate-100 dark:bg-slate-900 text-xs uppercase font-semibold text-slate-500 dark:text-slate-400">
                                    <tr>
                                        <th className="px-4 py-3">Date</th>
                                        <th className="px-4 py-3">Project</th>
                                        <th className="px-4 py-3">Tag</th>
                                        <th className="px-4 py-3">Service</th>
                                        <th className="px-4 py-3">Flow</th>
                                        <th className="px-4 py-3">Head</th>
                                        <th className="px-4 py-3">Eff.</th>
                                        <th className="px-4 py-3">Shaft Power</th>
                                        <th className="px-4 py-3">Motor</th>
                                        <th className="px-4 py-3 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-200 dark:divide-slate-700">
                                    {history.length === 0 ? (
                                        <tr><td colSpan="10" className="px-4 py-8 text-center text-slate-400 italic">No calculations saved yet.</td></tr>
                                    ) : (
                                        history.map((row) => (
                                            <tr key={row.id} className="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                                <td className="px-4 py-3 whitespace-nowrap text-xs">{row.date}</td>
                                                <td className="px-4 py-3 font-medium text-slate-900 dark:text-white">{row.project}</td>
                                                <td className="px-4 py-3">{row.tag}</td>
                                                <td className="px-4 py-3">{row.service}</td>
                                                <td className="px-4 py-3">{row.flow}</td>
                                                <td className="px-4 py-3">{row.head}</td>
                                                <td className="px-4 py-3">{row.eff}%</td>
                                                <td className="px-4 py-3 font-mono">{row.powerShaft}</td>
                                                <td className="px-4 py-3 font-mono text-brand-600 dark:text-brand-400 font-semibold">{row.motorSize}</td>
                                                <td className="px-4 py-3 text-right">
                                                    <button onClick={() => {
                                                        const newHistory = history.filter(item => item.id !== row.id);
                                                        setHistory(newHistory);
                                                    }} className="text-slate-400 hover:text-red-500 transition-colors p-1" title="Delete">
                                                        <Icon name="trash-2" size={16} />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
