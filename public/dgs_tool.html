    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqGx_Skjp_RKxIK-pHRGOlp22uLJdy6WE",
            authDomain: "my-app-hub-69db8.firebaseapp.com",
            projectId: "my-app-hub-69db8",
            storageBucket: "my-app-hub-69db8.firebasestorage.app",
            messagingSenderId: "709494807607",
            appId: "1:709494807607:web:e8cdafc2511ab6e354b3b2",
            measurementId: "G-KWWNJDP8LY"
        };
        Object.freeze(firebaseConfig);

        // --- APP CORE ENGINE ---
        class AppCore {
            constructor() {
                this.user = null;
                this.db = null;
                this.auth = null;
                this.globalState = {
                    theme: 'light',
                    notifications: 0,
                    lastActive: null,
                    globalNote: ''
                };
                this.stateListeners = [];
            }

            async init() {
                if (typeof firebase === 'undefined') return;
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                this.auth = firebase.auth();
                this.db = firebase.firestore();

                try {
                    await this.db.enablePersistence();
                    console.log("🔌 Offline mode enabled");
                } catch (err) {
                    console.log("Persistence disabled:", err.code);
                }

                this.injectStyles();
                this.setupAuth();
            }

            setupAuth() {
                this.auth.onAuthStateChanged(user => {
                    this.user = user;
                    if (user) {
                        this.connectGlobalStore();
                        this.renderNav(); 
                    } else {
                        this.renderNav();
                    }
                });
            }

            connectGlobalStore() {
                if (!this.user) return;
                this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            this.globalState = { ...this.globalState, ...doc.data() };
                            this.notifyListeners();
                            this.applyTheme(this.globalState.theme);
                        } else {
                            this.updateGlobalStore({ theme: 'light', created: Date.now() });
                        }
                    });
            }

            async updateGlobalStore(data) {
                if (!this.user) return;
                try {
                    await this.db.collection('users').doc(this.user.uid).collection('app_data').doc('global_store').set(
                        { ...data, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    );
                } catch (e) {
                    console.error("Sync Error:", e);
                }
            }

            subscribe(callback) {
                this.stateListeners.push(callback);
                callback(this.globalState);
            }

            notifyListeners() {
                this.stateListeners.forEach(cb => cb(this.globalState));
            }

            injectStyles() {
                if(typeof tailwind !== 'undefined') {
                    tailwind.config = {
                        darkMode: 'class',
                        theme: { extend: { fontFamily: { sans: ['Instrument Sans', 'sans-serif'] } } }
                    }
                }
            }

            applyTheme(theme) {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }

            toggleTheme() {
                const newTheme = this.globalState.theme === 'dark' ? 'light' : 'dark';
                this.updateGlobalStore({ theme: newTheme });
            }

            renderNav() {
                const navContainer = document.getElementById('global-nav');
                if (!navContainer) return;

                const email = this.user ? (this.user.email || 'Anonymous') : 'Not Logged In';
                const avatar = email.charAt(0).toUpperCase();

                navContainer.innerHTML = `
                    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-slate-800 dark:text-white hover:opacity-80 transition">
                                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">A</div>
                                <span>App Hub</span>
                            </a>

                            <div class="flex items-center gap-4">
                                <div id="global-status" class="hidden md:flex text-xs px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-slate-500">
                                    ${this.user ? '🟢 Synced' : '⚪ Offline'}
                                </div>

                                <button onclick="window.Core.toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                                    ${this.globalState.theme === 'dark' ? '🌙' : '☀️'}
                                </button>

                                <div class="relative group cursor-pointer">
                                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 text-white flex items-center justify-center font-bold shadow-sm">
                                        ${this.user ? avatar : '?'}
                                    </div>
                                    <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 py-1 hidden group-hover:block">
                                        <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                                            <p class="text-xs text-slate-500">Signed in as</p>
                                            <p class="text-sm font-medium truncate text-slate-900 dark:text-slate-100">${email}</p>
                                        </div>
                                        ${this.user ? '<button onclick="firebase.auth().signOut()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">Sign Out</button>' : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>
                `;
            }
        }

        // Initialize Global Instance
        window.Core = new AppCore();
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => window.Core.init());
        } else {
            window.Core.init();
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- Icons ---
        const Icon = ({ children, size = 20, className = "" }) => (

        );

        const FileText = (props) => <Icon {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>;

        const AlertTriangle = (props) => <Icon {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;

        const Plus = (props) => <Icon {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
        const Trash2 = (props) => <Icon {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
        const Download = (props) => <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
        const RefreshCw = (props) => <Icon {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
        const ClipboardCheck = (props) => <Icon {...props}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></Icon>;
        const Gauge = (props) => <Icon {...props}><path d="M2 12h2"/><path d="M20 12h2"/><path d="M12 2v2"/><path d="M12 22v-2"/><path d="M12 12a10 10 0 0 1 10 10"/><path d="M12 12a10 10 0 0 0-10 10"/><circle cx="12" cy="12" r="2"/></Icon>;
        const Wind = (props) => <Icon {...props}><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></Icon>;

        // --- Initial Data ---
        const initialCategories = [
            {
                id: 1,
                title: "1. Pre-Test Prerequisites & Documentation",
                icon: "FileText",
                items: [
                    { id: 101, text: "Approved Test Procedure available (API 692 Part 2, Annex C).", status: "pending", comment: "" },
                    { id: 102, text: "Material Certification (CMTRs) verified.", status: "pending", comment: "" },

                    { id: 104, text: "Balancing records verified (G2.5 or better).", status: "pending", comment: "" },
                    { id: 105, text: "Test Gas Quality verified clean and dry.", status: "pending", comment: "" },
                    { id: 106, text: "Instrumentation Calibration verified.", status: "pending", comment: "" }
                ]
            },
            {
                id: 2,
                title: "2. Visual & Dimensional Inspection",
                icon: "ClipboardCheck",
                items: [
                    { id: 201, text: "Seal faces visual inspection: No chips/scratches.", status: "pending", comment: "" },
                    { id: 202, text: "Verification of Spiral Groove depth.", status: "pending", comment: "" },
                    { id: 203, text: "Secondary sealing elements installed correctly.", status: "pending", comment: "" },
                    { id: 204, text: "Shaft sleeve fits checked.", status: "pending", comment: "" },
                    { id: 205, text: "Direction of Rotation (DOR) marked.", status: "pending", comment: "" }
                ]
            },
            {
                id: 3,
                title: "3. Static Testing (API 692 Sec 8.3)",
                icon: "Gauge",
                items: [
                    { id: 301, text: "Primary Seal Static Test (MASP hold).", status: "pending", comment: "" },
                    { id: 302, text: "Primary Seal Leakage Check.", status: "pending", comment: "" },
                    { id: 303, text: "Secondary Seal Static Test.", status: "pending", comment: "" },
                    { id: 304, text: "Secondary Seal Leakage Check.", status: "pending", comment: "" },
                    { id: 305, text: "Separation Seal Static Test.", status: "pending", comment: "" },
                    { id: 306, text: "Hysteresis Check.", status: "pending", comment: "" }
                ]
            },
            {
                id: 4,
                title: "4. Dynamic Testing (API 692 Sec 8.4)",
                icon: "RefreshCw",
                items: [
                    { id: 401, text: "Breakaway Torque measured.", status: "pending", comment: "" },
                    { id: 402, text: "Low Speed Run (Lift-off verify).", status: "pending", comment: "" },
                    { id: 403, text: "4-Hour Run at MCS.", status: "pending", comment: "" },
                    { id: 404, text: "Dynamic Leakage Stability < 10%.", status: "pending", comment: "" },
                    { id: 405, text: "Trip Speed Run.", status: "pending", comment: "" },
                    { id: 406, text: "Temperature Check (Primary Ring).", status: "pending", comment: "" },
                    { id: 407, text: "Shutdown Check (Coast down).", status: "pending", comment: "" }
                ]
            },
            {
                id: 5,
                title: "5. Post-Test Inspection",
                icon: "CheckCircle",
                items: [
                    { id: 501, text: "Strip Down Inspection.", status: "pending", comment: "" },
                    { id: 502, text: "Secondary Seal Condition.", status: "pending", comment: "" },
                    { id: 503, text: "Re-assembly & Final Static Check.", status: "pending", comment: "" },
                    { id: 504, text: "Shipping Preparation.", status: "pending", comment: "" }
                ]
            }
        ];

        const iconMap = {
            FileText: <FileText size={20} />,
            ClipboardCheck: <ClipboardCheck size={20} />,
            Gauge: <Gauge size={20} />,
            RefreshCw: <RefreshCw size={20} />,
            CheckCircle: <CheckCircle size={20} />
        };

        const DGSChecklistApp = () => {
            const [user, setUser] = useState(null);
            const [categories, setCategories] = useState(initialCategories);
            const [projectInfo, setProjectInfo] = useState({
                client: "",
                project: "",
                tagNo: "",
                sealVendor: "",
                testDate: new Date().toISOString().split('T')[0]
            });
            const [isItemModalOpen, setIsItemModalOpen] = useState(false);
            const [activeCatId, setActiveCatId] = useState(null);
            const [newItemText, setNewItemText] = useState("");
            const [saveStatus, setSaveStatus] = useState("idle");

            // --- Authentication & Data Loading ---
            useEffect(() => {
                const checkAuth = setInterval(() => {
                    if (window.Core && window.Core.user) {
                        setUser(window.Core.user);
                        clearInterval(checkAuth);
                        loadData(window.Core.user.uid);
                    }
                }, 500);
                return () => clearInterval(checkAuth);
            }, []);

            // --- Firestore Functions ---
            const loadData = (uid) => {
                if(!window.Core || !window.Core.db) return;

                const docRef = window.Core.db.collection('users').doc(uid).collection('app_data').doc('dgs_tool');

                docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.categories) setCategories(data.categories);
                        if (data.projectInfo) setProjectInfo(data.projectInfo);
                    } else {
                        // First time save
                        saveDataGeneric(initialCategories, projectInfo, uid);
                    }
                });
            };

            // Debounced Save (Native implementation replacing Lodash)
            function debounce(func, wait) {
                let timeout;
                return function(...args) {
                    const context = this;
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(context, args), wait);
                };
            }
            
            const saveRef = useRef(debounce((cat, proj, uid) => saveDataGeneric(cat, proj, uid), 2000));

            const saveDataGeneric = async (cat, proj, uid) => {
                if(!window.Core || !window.Core.db) return;
                setSaveStatus("saving");
                try {
                    await window.Core.db.collection('users').doc(uid).collection('app_data').doc('dgs_tool').set({
                        categories: cat,
                        projectInfo: proj,
                        lastUpdated: new Date().toISOString()
                    }, { merge: true });
                    
                    setSaveStatus("saved");
                    setTimeout(() => setSaveStatus("idle"), 2000);
                } catch (error) {
                    console.error("Save failed", error);
                    setSaveStatus("error");
                }
            };

            // Trigger Save on Change
            useEffect(() => {
                if(user) {
                    setSaveStatus("saving");
                    saveRef.current(categories, projectInfo, user.uid);
                }
            }, [categories, projectInfo, user]);

            // --- Logic ---
            const stats = useMemo(() => {
                let total = 0, pass = 0, fail = 0, na = 0, pending = 0;
                categories.forEach(cat => {
                    cat.items.forEach(item => {
                        total++;
                        if (item.status === 'pass') pass++;
                        else if (item.status === 'fail') fail++;
                        else if (item.status === 'na') na++;
                        else pending++;
                    });
                });
                return { total, pass, fail, na, pending, percent: total ? Math.round((pass + na) / total * 100) : 0 };
            }, [categories]);

            const handleStatusChange = (catId, itemId, newStatus) => {
                setCategories(prev => prev.map(cat => {
                    if (cat.id !== catId) return cat;
                    return {
                        ...cat,
                        items: cat.items.map(item => item.id === itemId ? { ...item, status: newStatus } : item)
                    };
                }));
            };

            const handleCommentChange = (catId, itemId, comment) => {
                setCategories(prev => prev.map(cat => {
                    if (cat.id !== catId) return cat;
                    return {
                        ...cat,
                        items: cat.items.map(item => item.id === itemId ? { ...item, comment } : item)
                    };
                }));
            };

            const addNewItem = (e) => {
                e.preventDefault();
                if (!newItemText.trim() || activeCatId === null) return;
                setCategories(prev => prev.map(cat => {
                    if (cat.id !== activeCatId) return cat;
                    return {
                        ...cat,
                        items: [...cat.items, { id: Date.now(), text: newItemText, status: "pending", comment: "" }]
                    };
                }));
                setNewItemText("");
                setIsItemModalOpen(false);
            };

            const deleteItem = (catId, itemId) => {
                if(!confirm("Delete this inspection point?")) return;
                setCategories(prev => prev.map(cat => {
                    if (cat.id !== catId) return cat;
                    return { ...cat, items: cat.items.filter(i => i.id !== itemId) };
                }));
            };

            const resetChecklist = () => {
                if (!confirm("Reset all checks? This will clear current data.")) return;
                setCategories(initialCategories);
            };

            const exportPDF = () => {
                if (!window.jspdf || !window.jspdf.jsPDF) {
                    alert("PDF library loading. Try again in a few seconds.");
                    return;
                }
                const doc = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                
                // Header
                doc.setFontSize(16);
                doc.setTextColor(41, 128, 185);
                doc.text("API 692 Dry Gas Seal Test Report", 15, 20);
                
                // Info
                doc.setFontSize(10);
                doc.setTextColor(60, 60, 60);
                doc.text(`Client: ${projectInfo.client}`, 15, 30);
                doc.text(`Project: ${projectInfo.project}`, 15, 35);
                doc.text(`Tag: ${projectInfo.tagNo}`, 100, 30);
                doc.text(`Vendor: ${projectInfo.sealVendor}`, 100, 35);

                let yPos = 45;

                categories.forEach(cat => {
                    if (yPos > 260) { doc.addPage(); yPos = 20; }
                    
                    doc.setFillColor(240, 240, 240);
                    doc.rect(15, yPos, 180, 8, 'F');
                    doc.setFontSize(11);
                    doc.setTextColor(0,0,0);
                    doc.text(cat.title, 17, yPos + 5.5);
                    yPos += 10;

                    const tableData = cat.items.map(i => [i.text, i.status.toUpperCase(), i.comment]);
                    
                    doc.autoTable({
                        startY: yPos,
                        head: [['Item', 'Status', 'Notes']],
                        body: tableData,
                        theme: 'grid',
                        margin: { left: 15, right: 15 },
                        columnStyles: {
                            0: { cellWidth: 90 },
                            1: { cellWidth: 25, halign: 'center' },
                            2: { cellWidth: 65 }
                        },
                        styles: { fontSize: 9, overflow: 'linebreak' },
                        didParseCell: function(data) {
                            if (data.section === 'body' && data.column.index === 1) {
                                if (data.cell.raw === 'FAIL') data.cell.styles.textColor = [200, 0, 0];
                                if (data.cell.raw === 'PASS') data.cell.styles.textColor = [0, 128, 0];
                            }
                        }
                    });
                    yPos = doc.lastAutoTable.finalY + 10;
                });

                // Summary Footer
                if (yPos > 250) { doc.addPage(); yPos = 20; }
                doc.setFontSize(12);
                doc.text(`Summary: ${stats.pass} Passed / ${stats.fail} Failed`, 15, yPos);
                
                doc.save(`DGS_Test_${projectInfo.tagNo || 'Report'}.pdf`);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center gap-3">
                                     <div className="flex items-center gap-2">
                                        <a href="index.html" className="text-slate-400 hover:text-blue-600 transition-colors text-sm font-medium">← Dashboard</a>
                                        <span className="text-slate-300">/</span>
                                        <div className="bg-blue-600 p-2 rounded-lg text-white">
                                            <Wind size={20} />
                                        </div>
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-bold text-slate-900 leading-tight">API 692 Validator</h1>
                                        <div className="flex items-center gap-2">
                                            <p className="text-xs text-slate-500">Rotating Equipment Expert</p>
                                            <span className={`text-xs px-2 py-0.5 rounded-full ${
                                                saveStatus === 'saved' ? 'bg-green-100 text-green-700' :
                                                saveStatus === 'saving' ? 'bg-yellow-100 text-yellow-700' : 
                                                'bg-gray-100 text-gray-500'
                                            }`}>
                                                {saveStatus === 'saving' ? 'Saving...' : saveStatus === 'saved' ? 'Saved' : 'Offline'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={resetChecklist} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg" title="Reset">
                                        <RefreshCw size={20} />
                                    </button>
                                    <button onClick={exportPDF} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 flex items-center gap-2">
                                        <Download size={16} /> <span className="hidden sm:inline">Export PDF</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                        {/* Inputs */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                <input type="text" placeholder="Client" className="p-2 border rounded text-sm" value={projectInfo.client} onChange={e => setProjectInfo({...projectInfo, client: e.target.value})} />
                                <input type="text" placeholder="Tag No" className="p-2 border rounded text-sm" value={projectInfo.tagNo} onChange={e => setProjectInfo({...projectInfo, tagNo: e.target.value})} />
                                <input type="text" placeholder="Seal Vendor" className="p-2 border rounded text-sm" value={projectInfo.sealVendor} onChange={e => setProjectInfo({...projectInfo, sealVendor: e.target.value})} />
                                <input type="date" className="p-2 border rounded text-sm" value={projectInfo.testDate} onChange={e => setProjectInfo({...projectInfo, testDate: e.target.value})} />
                            </div>
                        </div>

                        {/* Dashboard */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div className="bg-white p-4 rounded-xl border border-slate-200">
                                <div className="text-slate-500 text-xs uppercase font-bold">Progress</div>
                                <div className="text-2xl font-bold text-slate-900">{stats.percent}%</div>
                            </div>
                            <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                                <div className="text-green-600 text-xs uppercase font-bold">Passed</div>
                                <div className="text-2xl font-bold text-green-700">{stats.pass}</div>
                            </div>
                            <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                <div className="text-red-600 text-xs uppercase font-bold">Failed</div>
                                <div className="text-2xl font-bold text-red-700">{stats.fail}</div>
                            </div>
                             <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div className="text-slate-500 text-xs uppercase font-bold">Pending</div>
                                <div className="text-2xl font-bold text-slate-700">{stats.pending}</div>
                            </div>
                        </div>

                        {/* Checklist */}
                        <div className="space-y-6">
                            {categories.map((cat) => (
                                <div key={cat.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <span className="text-slate-500 hidden sm:block">{iconMap[cat.icon]}</span>
                                            <h3 className="font-semibold text-slate-800">{cat.title}</h3>
                                        </div>
                                        <button onClick={() => { setActiveCatId(cat.id); setIsItemModalOpen(true); }} className="text-blue-600 text-sm font-medium flex items-center gap-1">
                                            <Plus size={16} /> <span className="hidden sm:inline">Add</span>
                                        </button>
                                    </div>
                                    <div className="divide-y divide-slate-100">
                                        {cat.items.map((item) => (
                                            <div key={item.id} className="p-4 hover:bg-slate-50 transition-colors">
                                                <div className="flex flex-col sm:flex-row sm:items-start gap-4">
                                                    <div className="flex-grow">
                                                        <p className="text-slate-900 text-sm font-medium">{item.text}</p>
                                                        <input 
                                                            type="text" 
                                                            placeholder="Observations..." 
                                                            className="mt-1 w-full text-xs text-slate-600 border-b border-slate-200 focus:border-blue-500 outline-none bg-transparent"
                                                            value={item.comment}
                                                            onChange={(e) => handleCommentChange(cat.id, item.id, e.target.value)}
                                                        />
                                                    </div>
                                                    <div className="flex items-center gap-2 self-end sm:self-start">
                                                        <button onClick={() => handleStatusChange(cat.id, item.id, 'pass')} className={`p-1.5 rounded-md ${item.status === 'pass' ? 'bg-green-100 text-green-700 ring-1 ring-green-500' : 'bg-slate-100 text-slate-400'}`}><CheckCircle size={18}/></button>
                                                        <button onClick={() => handleStatusChange(cat.id, item.id, 'fail')} className={`p-1.5 rounded-md ${item.status === 'fail' ? 'bg-red-100 text-red-700 ring-1 ring-red-500' : 'bg-slate-100 text-slate-400'}`}><AlertTriangle size={18}/></button>
                                                        <button onClick={() => handleStatusChange(cat.id, item.id, 'na')} className={`p-1.5 rounded-md ${item.status === 'na' ? 'bg-gray-100 text-gray-700 ring-1 ring-gray-400' : 'bg-slate-100 text-slate-400'}`}><XCircle size={18}/></button>
                                                        <button onClick={() => deleteItem(cat.id, item.id)} className="p-1.5 text-slate-300 hover:text-red-500"><Trash2 size={18}/></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Add Item Modal */}
                    {isItemModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
                            <div className="bg-white rounded-lg p-6 w-full max-w-md shadow-xl">
                                <h3 className="text-lg font-bold mb-4">Add Inspection Point</h3>
                                <form onSubmit={addNewItem}>
                                    <textarea 
                                        className="w-full p-2 border border-slate-300 rounded mb-4 h-24 focus:ring-2 focus:ring-blue-500 outline-none"
                                        placeholder="Description..."
                                        value={newItemText}
                                        onChange={e => setNewItemText(e.target.value)}
                                        autoFocus
                                    />
                                    <div className="flex justify-end gap-2">
                                        <button type="button" onClick={() => setIsItemModalOpen(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Cancel</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Add</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DGSChecklistApp />);
    </script>
</body>
</html>
